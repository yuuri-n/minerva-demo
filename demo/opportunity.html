<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Minerva Demo - 商談詳細</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sf-header">
  <a href="index.html" class="logo">⚡ Minerva CRM</a>
  <nav>
    <a href="index.html">ホーム</a>
    <a href="leads.html">架電リスト</a>
    <a href="screen_list.html">画面一覧</a>
  </nav>
</header>

<div class="sf-page">
  <div class="breadcrumb"><a href="index.html">ホーム</a> &rsaquo; <a href="leads.html">架電リスト</a> &rsaquo; 商談詳細</div>

  <div id="main-content"></div>
</div>

<!-- 活動記録モーダル -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📞 活動記録（Call Log）</span>
      <button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>コール結果 <span style="color:red">*</span></label>
        <select id="callResult">
          <option value="">選択してください</option>
          <option value="不通">不通</option>
          <option value="通電">通電</option>
          <option value="いま忙しい">いま忙しい</option>
          <option value="折り返し依頼">折り返し依頼</option>
          <option value="アポ獲得">アポ獲得</option>
        </select>
      </div>
      <div class="form-group">
        <label>次回架電予定 <span style="color:red">*</span></label>
        <input type="datetime-local" id="nextActionAt">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="memo" rows="3" placeholder="通話内容・申し送り事項など"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCallLog()">💾 保存</button>
    </div>
  </div>
</div>

<button class="reset-btn" onclick="resetData(); location.href='index.html';">🔄 データリセット</button>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const oppId = params.get('id') || 'OPP-001';
  const autoOpen = params.get('action') === 'call';

  function render() {
    const data = getData();
    const opp = data.opportunities.find(o => o.id === oppId);
    const acc = getAccount(opp.accountId);
    const activities = getActivitiesForOpportunity(oppId);
    const relatedCases = getCasesForAccount(opp.accountId);

    const statusClass = { 'オープン': 'case-open', '対応中': 'case-inprog', 'クローズ': 'case-closed' };

    document.getElementById('main-content').innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">${opp.name}</div>
          <div style="font-size:13px;color:#706e6b;margin-top:4px">
            <a href="#" style="color:#0176d3">${acc.name}</a> &nbsp;|&nbsp; ${acc.phone}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <a href="leads.html" class="btn btn-secondary">← 架電リストへ</a>
          <button class="btn btn-primary" onclick="openModal()">📞 活動記録を追加</button>
        </div>
      </div>

      <!-- ハイライト: 最新ステータス & 次アクション -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="highlight-box">
          <div class="label">最新ステータス</div>
          <div class="value" style="color:${callStatusBadge(opp.callStatus)}">${opp.callStatus}</div>
          <div class="sub">前回接触：${formatDate(opp.lastContactedAt)}</div>
        </div>
        <div class="highlight-box" style="border-left-color:#ff9e2c;background:#fffbf0">
          <div class="label">次アクション</div>
          <div class="value" style="color:#c77b00;font-size:15px">${opp.nextActionNote}</div>
          <div class="sub">予定日時：${formatDate(opp.nextActionAt)}</div>
        </div>
      </div>

      <div class="two-col">
        <div>
          <!-- 商談基本情報 -->
          <div class="sf-card">
            <div class="sf-card-header"><span class="sf-card-title">商談情報</span></div>
            <div class="sf-card-body">
              <div class="detail-grid">
                <div class="detail-item">
                  <label>ステージ</label>
                  <span><span class="badge" style="background:${stageColor(opp.stage)}">${opp.stage}</span></span>
                </div>
                <div class="detail-item">
                  <label>商談金額</label>
                  <span>¥${opp.amount.toLocaleString()}</span>
                </div>
                <div class="detail-item">
                  <label>クローズ予定日</label>
                  <span>${formatDateOnly(opp.closeDate)}</span>
                </div>
                <div class="detail-item">
                  <label>会社名</label>
                  <span>${acc.name}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- タイムライン -->
          <div class="sf-card">
            <div class="sf-card-header">
              <span class="sf-card-title">📅 活動タイムライン</span>
              <span style="font-size:12px;color:#706e6b">${activities.length}件</span>
            </div>
            <div class="sf-card-body">
              ${activities.length === 0
                ? '<div class="empty-state">活動記録がありません。<br>「📞 活動記録を追加」から記録してください。</div>'
                : `<ul class="timeline">
                    ${activities.map(a => {
                      const icon = { '不通': '📵', '通電': '📞', 'いま忙しい': '⏰', '折り返し依頼': '🔄', 'アポ獲得': '🎯' }[a.callResult] || '📞';
                      return `<li class="timeline-item">
                        <div class="timeline-icon">${icon}</div>
                        <div class="timeline-content">
                          <div class="timeline-title">${a.callResult}</div>
                          <div class="timeline-meta">${formatDate(a.createdAt)}　次回：${formatDate(a.nextActionAt)}</div>
                          ${a.memo ? `<div class="timeline-memo">${a.memo}</div>` : ''}
                        </div>
                      </li>`;
                    }).join('')}
                  </ul>`
              }
            </div>
          </div>
        </div>

        <!-- 関連ケース -->
        <div>
          <div class="sf-card">
            <div class="sf-card-header">
              <span class="sf-card-title">🎫 関連ケース（${acc.name}）</span>
            </div>
            <div class="sf-card-body" style="padding:0">
              ${relatedCases.length === 0
                ? '<div class="empty-state">関連ケースなし</div>'
                : `<table class="sf-table">
                    <thead><tr><th>件名</th><th>ステータス</th></tr></thead>
                    <tbody>
                      ${relatedCases.map(c => `
                        <tr>
                          <td><a href="case.html?id=${c.id}">${c.subject}</a></td>
                          <td><span class="badge ${statusClass[c.status] || ''}">${c.status}</span></td>
                        </tr>`).join('')}
                    </tbody>
                  </table>`
              }
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function openModal() {
    const now = new Date();
    now.setMinutes(0, 0, 0);
    now.setDate(now.getDate() + 1);
    document.getElementById('nextActionAt').value = now.toISOString().slice(0, 16);
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('callResult').value = '';
    document.getElementById('memo').value = '';
  }

  function saveCallLog() {
    const callResult = document.getElementById('callResult').value;
    const nextActionAt = document.getElementById('nextActionAt').value;
    const memo = document.getElementById('memo').value;

    if (!callResult) { alert('コール結果を選択してください'); return; }
    if (!nextActionAt) { alert('次回架電予定を入力してください'); return; }

    applyCallResult(oppId, callResult, nextActionAt, memo);
    closeModal();
    render();
  }

  render();
  if (autoOpen) setTimeout(openModal, 300);
</script>
</body>
</html>
