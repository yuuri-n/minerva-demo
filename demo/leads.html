<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Minerva Demo - 架電リスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sf-header">
  <a href="index.html" class="logo">⚡ Minerva CRM</a>
  <nav>
    <a href="index.html">ホーム</a>
    <a href="leads.html" class="active">架電リスト</a>
    <a href="screen_list.html">画面一覧</a>
  </nav>
</header>

<div class="sf-page">
  <div class="page-header">
    <div>
      <div class="breadcrumb"><a href="index.html">ホーム</a> &rsaquo; 架電リスト</div>
      <div class="page-title">📞 今日の架電リスト</div>
    </div>
  </div>

  <div class="sf-card">
    <div class="sf-card-header">
      <span class="sf-card-title">架電対象商談</span>
      <span style="font-size:12px;color:#706e6b" id="count"></span>
    </div>
    <div class="sf-card-body" style="padding:0">
      <table class="sf-table" id="leads-table"></table>
    </div>
  </div>
</div>

<button class="reset-btn" onclick="resetData(); location.reload();">🔄 データリセット</button>

<script src="data.js"></script>
<script>
  const data = getData();
  const opps = data.opportunities;

  document.getElementById('count').textContent = `${opps.length}件`;

  document.getElementById('leads-table').innerHTML = `
    <thead>
      <tr>
        <th>優先</th>
        <th>会社名</th>
        <th>商談名</th>
        <th>ステージ</th>
        <th>最新ステータス</th>
        <th>次回架電予定</th>
        <th>前回接触</th>
        <th>アクション</th>
      </tr>
    </thead>
    <tbody>
      ${opps.map((o, i) => {
        const acc = getAccount(o.accountId);
        const priority = o.callStatus === '折り返し待ち' ? '🔴' :
                         o.callStatus === '未架電' ? '🟡' : '⚪';
        return `<tr>
          <td style="text-align:center;font-size:16px">${priority}</td>
          <td>${acc.name}<br><span style="font-size:11px;color:#706e6b">${acc.phone}</span></td>
          <td><a href="opportunity.html?id=${o.id}">${o.name}</a></td>
          <td><span class="badge" style="background:${stageColor(o.stage)}">${o.stage}</span></td>
          <td><span class="badge" style="background:${callStatusBadge(o.callStatus)}">${o.callStatus}</span></td>
          <td style="font-size:12px">${formatDate(o.nextActionAt)}</td>
          <td style="font-size:12px;color:#706e6b">${formatDate(o.lastContactedAt)}</td>
          <td>
            <a href="opportunity.html?id=${o.id}&action=call" class="btn btn-primary btn-sm">📞 架電記録</a>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  `;
</script>
</body>
</html>
